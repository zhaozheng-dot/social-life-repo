<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>面试小助理 - 个人中心页</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  display: flex; justify-content: center; align-items: center;
  min-height: 100vh; background: #1a1a2e;
}
.phone-frame {
  width: 375px; height: 812px;
  background: #F5F7FA;
  position: relative; overflow: hidden;
  border-radius: 40px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  display: flex; flex-direction: column;
}
.status-bar {
  height: 44px; display: flex; align-items: center;
  justify-content: space-between; padding: 0 24px;
  font-size: 12px; color: #fff;
  background: linear-gradient(135deg, #2B7FFF, #1A5FD4);
}
/* 用户头部 */
.profile-header {
  background: linear-gradient(135deg, #2B7FFF, #1A5FD4);
  padding: 20px 20px 50px;
  border-radius: 0 0 28px 28px;
  position: relative;
}
.profile-top {
  display: flex; align-items: center; gap: 16px;
  margin-bottom: 20px;
}
.profile-avatar {
  width: 64px; height: 64px;
  border-radius: 50%;
  background: rgba(255,255,255,0.2);
  display: flex; align-items: center; justify-content: center;
  border: 3px solid rgba(255,255,255,0.4);
}
.profile-avatar svg { width: 36px; height: 36px; }
.profile-info { flex: 1; }
.profile-name {
  font-size: 18px; font-weight: 700; color: #fff;
  font-family: 'PingFang SC', sans-serif;
  margin-bottom: 4px;
}
.profile-school {
  font-size: 13px; color: rgba(255,255,255,0.7);
}
.edit-btn {
  font-size: 12px; color: #fff;
  border: 1px solid rgba(255,255,255,0.4);
  padding: 4px 12px; border-radius: 14px;
  cursor: pointer;
}
/* 统计面板 */
.stats-panel {
  display: flex; justify-content: space-around;
  background: #fff;
  margin: -30px 20px 16px;
  border-radius: 16px;
  padding: 20px;
  position: relative; z-index: 1;
  box-shadow: 0 4px 16px rgba(0,0,0,0.06);
}
.stat-item { text-align: center; }
.stat-num {
  font-size: 22px; font-weight: 700;
  font-family: 'PingFang SC', sans-serif;
}
.stat-num.blue { color: #2B7FFF; }
.stat-num.orange { color: #FF8C42; }
.stat-num.green { color: #34C759; }
.stat-label { font-size: 12px; color: #86909C; margin-top: 4px; }
/* 功能列表 */
.menu-section {
  padding: 0 20px;
  margin-bottom: 12px;
}
.menu-card {
  background: #fff;
  border-radius: 16px;
  overflow: hidden;
  box-shadow: 0 2px 8px rgba(0,0,0,0.04);
}
.menu-item {
  display: flex; align-items: center;
  padding: 16px;
  border-bottom: 1px solid #F2F3F5;
  cursor: pointer;
}
.menu-item:last-child { border-bottom: none; }
.menu-icon {
  width: 36px; height: 36px;
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  margin-right: 12px;
}
.menu-icon svg { width: 20px; height: 20px; }
.menu-text {
  flex: 1; font-size: 14px; color: #1D2129;
  font-family: 'PingFang SC', sans-serif;
}
.menu-arrow {
  color: #C9CDD4;
}
.menu-badge {
  font-size: 11px; color: #fff;
  background: #FF4D4F;
  padding: 1px 6px; border-radius: 8px;
  margin-right: 8px;
}
/* 底部导航 */
.bottom-nav {
  height: 70px; background: #fff;
  display: flex; align-items: center;
  justify-content: space-around;
  border-top: 1px solid #F2F3F5;
  padding-bottom: 10px;
  margin-top: auto;
}
.nav-item {
  display: flex; flex-direction: column;
  align-items: center; gap: 4px;
}
.nav-item svg { width: 24px; height: 24px; }
.nav-item span { font-size: 10px; }
.nav-item.active svg { color: #2B7FFF; }
.nav-item.active span { color: #2B7FFF; font-weight: 600; }
.nav-item:not(.active) svg { color: #C9CDD4; }
.nav-item:not(.active) span { color: #C9CDD4; }
</style>
</head>
<body>
<div class="phone-frame">
  <div class="status-bar">
    <span>9:41</span>
    <span style="display:flex;gap:4px;align-items:center;">
      <svg width="16" height="12" viewBox="0 0 16 12"><rect x="0" y="5" width="3" height="7" rx="1" fill="#fff"/><rect x="4.5" y="3" width="3" height="9" rx="1" fill="#fff"/><rect x="9" y="1" width="3" height="11" rx="1" fill="#fff"/><rect x="13.5" y="0" width="2.5" height="12" rx="1" fill="#fff"/></svg>

      <div class="menu-item">

        <span class="menu-text">我的收藏</span>

  </div>
  <div class="menu-section">
    <div class="menu-card">
      <div class="menu-item">
        <div class="menu-icon" style="background:#F2F3F5">
          <svg viewBox="0 0 24 24" fill="none" stroke="#86909C" stroke-width="1.8"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>

      <div class="menu-item">

          <svg viewBox="0 0 24 24" fill="none" stroke="#86909C" stroke-width="1.8"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>

        </div>
        <span class="menu-text" style="color:#FF4D4F">退出登录</span>
        <svg class="menu-arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#C9CDD4" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>

  <!-- 底部导航 -->

</div>
</body>
</html>
