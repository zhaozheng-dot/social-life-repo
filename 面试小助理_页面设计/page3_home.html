<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>面试小助理 - 首页面试看板</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  display: flex; justify-content: center; align-items: center;
  min-height: 100vh; background: #1a1a2e;
}
.phone-frame {
  width: 375px; height: 812px;
  background: #F5F7FA;
  position: relative; overflow: hidden;
  border-radius: 40px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  display: flex; flex-direction: column;
}
/* 状态栏 */
.status-bar {
  height: 44px; display: flex; align-items: center;
  justify-content: space-between; padding: 0 24px;
  font-size: 12px; color: #fff;
  background: #2B7FFF;
}
/* 导航头部 */
.nav-header {
  background: linear-gradient(135deg, #2B7FFF, #1A5FD4);
  padding: 0 20px 20px;
  border-radius: 0 0 24px 24px;
}
.nav-top {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 16px;
}
.nav-title {
  font-family: 'PingFang SC', sans-serif;
  font-size: 20px; font-weight: 700; color: #fff;
}
.nav-icons {
  display: flex; gap: 16px;
}
.nav-icon {
  width: 24px; height: 24px;
  display: flex; align-items: center; justify-content: center;
  position: relative;
}
.badge {
  position: absolute; top: -4px; right: -6px;
  width: 16px; height: 16px;
  background: #FF4D4F; border-radius: 50%;
  font-size: 10px; color: #fff;
  display: flex; align-items: center; justify-content: center;
}
/* 搜索栏 */
.search-bar {
  background: rgba(255,255,255,0.2);
  border-radius: 20px;
  height: 40px;
  display: flex; align-items: center;
  padding: 0 16px;
}
.search-icon { margin-right: 8px; opacity: 0.7; }
.search-text { font-size: 14px; color: rgba(255,255,255,0.6); }
/* 快捷统计 */
.quick-stats {
  display: flex; justify-content: space-around;
  padding: 16px 20px;
  margin: 0 16px;
  background: #fff;
  border-radius: 16px;
  margin-top: -10px;
  position: relative; z-index: 1;
  box-shadow: 0 2px 12px rgba(0,0,0,0.06);
}
.stat-item { text-align: center; }
.stat-num {
  font-size: 24px; font-weight: 700;
  font-family: 'PingFang SC', sans-serif;
}
.stat-num.blue { color: #2B7FFF; }
.stat-num.orange { color: #FF8C42; }
.stat-num.green { color: #34C759; }
.stat-label { font-size: 12px; color: #86909C; margin-top: 2px; }
/* 内容区 */
.content {
  flex: 1; padding: 16px 20px;
  overflow-y: auto;
}
.section-header {
  display: flex; align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
}
.section-title {
  font-size: 16px; font-weight: 600; color: #1D2129;
  font-family: 'PingFang SC', sans-serif;
}
.section-more {
  font-size: 12px; color: #86909C;
  display: flex; align-items: center; gap: 4px;
}
/* 面试卡片 */
.interview-card {
  background: #fff;
  border-radius: 16px;
  padding: 16px;
  margin-bottom: 12px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.04);
  display: flex;
  align-items: flex-start;
  gap: 14px;
  transition: transform 0.2s;
}
.company-logo {
  width: 48px; height: 48px;
  border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; font-weight: 700; color: #fff;
  flex-shrink: 0;
}
.card-info { flex: 1; }
.card-row1 {
  display: flex; align-items: center;
  justify-content: space-between;
  margin-bottom: 4px;
}
.company-name {
  font-size: 15px; font-weight: 600; color: #1D2129;
}
.status-tag {
  font-size: 11px; padding: 2px 8px;
  border-radius: 10px; font-weight: 500;
}
.tag-pending { background: #EBF2FF; color: #2B7FFF; }
.tag-done { background: #E8F8EE; color: #34C759; }
.tag-cancel { background: #F2F3F5; color: #86909C; }
.card-position {
  font-size: 13px; color: #86909C;
  margin-bottom: 8px;
}
.card-meta {
  display: flex; gap: 16px;
}
.meta-item {
  font-size: 12px; color: #86909C;
  display: flex; align-items: center; gap: 4px;
}
.meta-item svg { width: 14px; height: 14px; }
/* 浮动按钮 */
.fab {
  position: absolute; bottom: 80px; right: 24px;
  width: 56px; height: 56px;
  background: linear-gradient(135deg, #2B7FFF, #1A5FD4);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 4px 20px rgba(43,127,255,0.4);
  cursor: pointer;
}
/* 底部导航 */
.bottom-nav {
  height: 70px; background: #fff;
  display: flex; align-items: center;
  justify-content: space-around;
  border-top: 1px solid #F2F3F5;
  padding-bottom: 10px;
}
.nav-item {
  display: flex; flex-direction: column;
  align-items: center; gap: 4px;
}
.nav-item svg { width: 24px; height: 24px; }
.nav-item span { font-size: 10px; }
.nav-item.active svg { color: #2B7FFF; }
.nav-item.active span { color: #2B7FFF; font-weight: 600; }
.nav-item:not(.active) svg { color: #C9CDD4; }
.nav-item:not(.active) span { color: #C9CDD4; }
</style>
</head>
<body>
